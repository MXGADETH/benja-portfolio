<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B.S. Portfolio Hub - โรงเรียนเบญจมราชานุสรณ์</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Sarabun', 'Inter', sans-serif;
        }
        /* Custom Maroon color palette mapping for BS School (Benjamarachanusorn) */
        .bs-maroon { color: #800000; }
        .bs-bg-maroon { background-color: #800000; }
        .bs-border-maroon { border-color: #800000; }
        .bg-pattern {
            background-color: #800000;
            background-image: radial-gradient(circle at top right, rgba(251, 191, 36, 0.15), transparent 60%);
        }
        
        /* 3D Floating Animations for Banner Elements */
        @keyframes floatY {
            0%, 100% { transform: translateY(0px) rotate(6deg); }
            50% { transform: translateY(-15px) rotate(8deg); }
        }
        @keyframes floatYReverse {
            0%, 100% { transform: translateY(0px) rotate(-6deg); }
            50% { transform: translateY(12px) rotate(-4deg); }
        }
        .animate-float-slow {
            animation: floatY 8s ease-in-out infinite;
        }
        .animate-float-reverse {
            animation: floatYReverse 9s ease-in-out infinite 1s;
        }
        .animate-float-delayed {
            animation: floatY 11s ease-in-out infinite 2s;
        }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // นำ URL เว็บแอปที่ก๊อปปี้มาจาก Google Apps Script มาวางแทนที่เครื่องหมายคำพูดตรงนี้ได้เลยครับน้า
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgzj3JmBANq9AxKNpWFtipElI98mpDA0UV6QzmkdFVHkZAgdd3OdPnOVEDUh48SrjGxQ/exec"; 

        // Brand colors definitions for each University
        const UNI_COLORS = {
            'จุฬาลงกรณ์มหาวิทยาลัย': { primary: '#DF1995', text: 'text-white', badge: 'bg-[#DF1995]' },
            'มหาวิทยาลัยธรรมศาสตร์': { primary: '#E21C24', secondary: '#FFCD00', text: 'text-white', badge: 'bg-[#E21C24]' },
            'มหาวิทยาลัยศรีนครินทรวิโรฒ': { primary: '#9A1F36', text: 'text-white', badge: 'bg-[#9A1F36]' },
            'มหาวิทยาลัยเกษตรศาสตร์': { primary: '#006633', text: 'text-white', badge: 'bg-[#006633]' },
            'สถาบันเทคโนโลยีพระจอมเกล้าเจ้าคุณทหารลาดกระบัง': { primary: '#FF5000', text: 'text-white', badge: 'bg-[#FF5000]' },
            'มหาวิทยาลัยเทคโนโลยีพระจอมเกล้าพระนครเหนือ': { primary: '#990000', secondary: '#FFCC00', text: 'text-white', badge: 'bg-[#990000]' },
            'มหาวิทยาลัยเทคโนโลยีพระจอมเกล้าธนบุรี': { primary: '#F37021', text: 'text-white', badge: 'bg-[#F37021]' },
            'วิทยาลัยเพาะช่าง': { primary: '#1A1A1A', secondary: '#800000', text: 'text-white', badge: 'bg-[#800000]' },
            'มหาวิทยาลัยศิลปากร': { primary: '#00A896', text: 'text-white', badge: 'bg-[#00A896]' },
            'มหาวิทยาลัยรามคำแหง': { primary: '#003366', secondary: '#FFCC00', text: 'text-white', badge: 'bg-[#003366]' },
            'มหาวิทยาลัยแม่ฟ้าหลวง': { primary: '#7A1F1D', secondary: '#D4AF37', text: 'text-white', badge: 'bg-[#7A1F1D]' },
            'มหาวิทยาลัยพะเยา': { primary: '#5B2C6F', secondary: '#F1C40F', text: 'text-white', badge: 'bg-[#5B2C6F]' },
            'มหาวิทยาลัยสงขลานครินทร์': { primary: '#002C6C', text: 'text-white', badge: 'bg-[#002C6C]' },
            'มหาวิทยาลัยทักษิณ': { primary: '#1B4F72', secondary: '#2ECC71', text: 'text-white', badge: 'bg-[#1B4F72]' }
        };

        const UNI_LOGOS = {
            'จุฬาลงกรณ์มหาวิทยาลัย': 'https://img2.pic.in.th/Logo_of_Chulalongkorn_University_Colored.png',
            'มหาวิทยาลัยธรรมศาสตร์': 'https://img2.pic.in.th/Emblem_of_Thammasat_University.svgee5de45def535933.png',
            'มหาวิทยาลัยศรีนครินทรวิโรฒ': 'https://upload.wikimedia.org/wikipedia/commons/b/bd/Emblem_of_Srinakharinwirot_University.png',
            'มหาวิทยาลัยเกษตรศาสตร์': 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/ef/Kasetsart_University_Logo_Board_%28cropped%29.png/512px-Kasetsart_University_Logo_Board_%28cropped%29.png',
            'สถาบันเทคโนโลยีพระจอมเกล้าเจ้าคุณทหารลาดกระบัง': 'https://upload.wikimedia.org/wikipedia/commons/d/df/KMITL_Sublogo.svg',
            'มหาวิทยาลัยเทคโนโลยีพระจอมเกล้าพระนครเหนือ': 'https://upload.wikimedia.org/wikipedia/commons/e/ee/KMUTNB_Logo.svg',
            'มหาวิทยาลัยเทคโนโลยีพระจอมเกล้าธนบุรี': 'https://upload.wikimedia.org/wikipedia/commons/7/77/Sublogo_of_King_Mongkut%27s_University_of_Technology_Thonburi.svg',
            'วิทยาลัยเพาะช่าง': 'https://upload.wikimedia.org/wikipedia/commons/e/ee/RMUTR_Logo.svg', 
            'มหาวิทยาลัยศิลปากร': 'https://upload.wikimedia.org/wikipedia/commons/4/43/Logo_of_Silpakorn_University.svg',
            'มหาวิทยาลัยรามคำแหง': 'https://upload.wikimedia.org/wikipedia/commons/5/52/Emblem_of_Ramkhamhaeng_University%2C_BW.svg',
            'มหาวิทยาลัยแม่ฟ้าหลวง': 'https://upload.wikimedia.org/wikipedia/th/1/15/Mae_Fah_Luang_University_Logo.png',
            'มหาวิทยาลัยพะเยา': 'https://upload.wikimedia.org/wikipedia/commons/e/ea/Logo_of_University_of_Phayao.svg',
            'มหาวิทยาลัยสงขลานครินทร์': 'https://upload.wikimedia.org/wikipedia/commons/1/11/Prince_of_Songkla_University_Emblem.png',
            'มหาวิทยาลัยทักษิณ': 'https://upload.wikimedia.org/wikipedia/commons/e/e0/Thaksin_University_Emblem.png'
        };

        const INITIAL_PORTFOLIOS = [
            {
                id: 'port-1',
                title: 'Portfolio ยื่นคณะวิศวกรรมศาสตร์ จุฬาฯ',
                seniorName: 'พี่เต้ (บ.ส.39)',
                nickname: 'เต้',
                gpa: '3.85',
                track: 'วิทย์-คณิต(Gifted)',
                university: 'จุฬาลงกรณ์มหาวิทยาลัย',
                faculty: 'วิศวกรรมศาสตร์',
                major: 'วิศวกรรมคอมพิวเตอร์',
                round: 'รอบ 1 Portfolio',
                highlights: [
                    'รางวัลชนะเลิศการประกวดนวัตกรรมระดับภาค',
                    'หัวหน้าทีมหุ่นยนต์โรงเรียนเบญจมราชานุสรณ์',
                    'เกียรติบัตรค่ายเยาวชนคอมพิวเตอร์ระดับประเทศ'
                ],
                tips: 'เน้นย้ำเรื่องงานแก้ปัญหาจริงครับ ในพอร์ตให้พยายามบอกว่าโครงการที่เราทำแก้ปัญหาอะไร ไม่ใช่แค่ทำตามคำสั่ง และสรุปผลลัพธ์เป็นตัวเลขเด่น ๆ ให้ชัดเจน!',
                hasPdpaChecked: true,
                status: 'approved',
                port_link: '#',
                pagePreviews: [
                    { title: 'หน้าปก (Cover)', desc: 'เน้นสีชมพูจุฬาฯ และผลงานเด่น', color: 'bg-pink-700' },
                    { title: 'ประวัติส่วนตัว (Profile)', desc: 'ทักษะโปรแกรมมิ่ง และเกรดสะสม', color: 'bg-slate-100' },
                    { title: 'ผลงานเด่น (Highlight Project)', desc: 'สรุปโครงงานหุ่นยนต์แก้ปัญหาด้วย AI', color: 'bg-slate-100' },
                    { title: 'กิจกรรม (Activities)', desc: 'รวมภาพค่ายอาสาและงานโรงเรียน บ.ส.', color: 'bg-slate-100' }
                ]
            }
            // ... ข้อมูลเดิมตัวอื่นๆ สามารถใส่ไว้ตรงนี้ตามปกติได้เลยครับ ...
        ];

        function LogoFallback({ name }) {
            const initials = name ? name.substring(0, 2) : 'บ.ส.';
            return (
                <div className="w-full h-full bg-slate-100 flex items-center justify-center border border-slate-200 rounded-full select-none">
                    <span className="text-[10px] font-extrabold text-slate-600 tracking-tighter text-center">{initials}</span>
                </div>
            );
        }

        function UniversityEmblem({ name, size = 'w-10 h-10' }) {
            const [imgFailed, setImgFailed] = useState(false);
            const logoUrl = UNI_LOGOS[name];

            return (
                <div className={`inline-block shrink-0 ${size} bg-white rounded-full overflow-hidden shadow-sm border border-slate-200/80 flex items-center justify-center p-1 transition-all duration-300 hover:scale-105`}>
                    {!imgFailed && logoUrl ? (
                        <img 
                            src={logoUrl} 
                            alt={name} 
                            onError={() => setImgFailed(true)} 
                            className="w-full h-full object-contain max-h-full max-w-full select-none"
                            referrerPolicy="no-referrer"
                        />
                    ) : (
                        <LogoFallback name={name} />
                    )}
                </div>
            );
        }

        function App() {
            const [portfolios, setPortfolios] = useState(INITIAL_PORTFOLIOS);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedUni, setSelectedUni] = useState('all');
            const [selectedFaculty, setSelectedFaculty] = useState('all');
            const [selectedRound, setSelectedRound] = useState('all');
            const [activeTab, setActiveTab] = useState('junior'); 
            
            const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(false);
            const [adminPassword, setAdminPassword] = useState('');

            const [selectedPort, setSelectedPort] = useState(null);
            const [notification, setNotification] = useState(null);

            // แก้ไข State ของฟอร์มผู้ใช้ฝั่งพี่ศิษย์เก่าให้สมบูรณ์ครบครัน
            const [formName, setFormName] = useState('');
            const [formNickname, setFormNickname] = useState('');
            const [formGpa, setFormGpa] = useState('');
            const [formTrack, setFormTrack] = useState('วิทย์-คณิต');
            const [formUni, setFormUni] = useState('จุฬาลงกรณ์มหาวิทยาลัย');
            const [formFaculty, setFormFaculty] = useState('');
            const [formMajor, setFormMajor] = useState('');
            const [formRound, setFormRound] = useState('รอบ 1 Portfolio');
            const [formTitle, setFormTitle] = useState('');
            const [formHighlight1, setFormHighlight1] = useState('');
            const [formHighlight2, setFormHighlight2] = useState('');
            const [formHighlight3, setFormHighlight3] = useState('');
            const [formTips, setFormTips] = useState('');
            const [formPortLink, setFormPortLink] = useState(''); // เก็บลิงก์ Google Drive พอร์ตจริง
            const [formPdpa, setFormPdpa] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);

            // ฟังก์ชันสำหรับส่งข้อมูลไปยัง Google Sheets
            const handleSubmitPortfolio = (e) => {
                e.preventDefault();

                if (!formPdpa) {
                    alert("กรุณากดยอมรับเงื่อนไขสิทธิ์ PDPA ความปลอดภัยข้อมูลก่อนส่งฟอร์มครับ");
                    return;
                }

                setIsSubmitting(true);

                const newPortfolioData = {
                    fullname: formName,
                    nickname: formNickname,
                    major: formTrack,
                    gpax: formGpa,
                    university: formUni,
                    faculty: formFaculty,
                    field: formMajor,
                    round: formRound,
                    title: formTitle,
                    highlights: `${formHighlight1} | ${formHighlight2} | ${formHighlight3}`,
                    intro: formTips,
                    port_link: formPortLink
                };

                // จัดการส่งค่าแบบข้ามโดเมนไปยัง Google Sheets API ด้วย Fetch 
                fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(newPortfolioData)
                })
                .then(() => {
                    alert("🎉 ส่งข้อมูลแชร์พอร์ตโฟลิโอสำเร็จ! ข้อมูลถูกบันทึกลง Google Sheets แล้ว");
                    
                    // ทำการเคลียร์ล้างข้อมูลหน้าฟอร์มให้สะอาด
                    setFormName('');
                    setFormNickname('');
                    setFormGpa('');
                    setFormFaculty('');
                    setFormMajor('');
                    setFormTitle('');
                    setFormHighlight1('');
                    setFormHighlight2('');
                    setFormHighlight3('');
                    setFormTips('');
                    setFormPortLink('');
                    setFormPdpa(false);
                    setIsSubmitting(false);
                })
                .catch(error => {
                    console.error("Error:", error);
                    alert("❌ เกิดปัญหาขัดข้อง ไม่สามารถบันทึกข้อมูลได้ กรุณาลองใหม่อีกครั้ง");
                    setIsSubmitting(false);
                });
            };

            return (
                <div className="min-h-screen flex flex-col justify-between">
                    {/* ส่วนแสดงผล UI หน้ากากเว็บหลักและเมนูสลับแท็บงาน */}
                    <header className="bg-pattern text-white py-8 px-4 text-center shadow-md">
                        <h1 className="text-3xl font-bold mb-2">B.S. Portfolio Hub</h1>
                        <p className="text-amber-300 font-medium">คลังสะสมพอร์ตเล่มจริงของรุ่นพี่ โรงเรียนเบญจมราชานุสรณ์</p>
                        
                        <div className="flex justify-center gap-4 mt-6">
                            <button 
                                onClick={() => setActiveTab('junior')}
                                className={`px-4 py-2 rounded-md font-medium text-sm transition-all ${activeTab === 'junior' ? 'bg-amber-400 text-slate-900 shadow' : 'bg-maroon hover:bg-red-900 border border-red-700'}`}
                            >
                                🔍 ค้นหาพอร์ตโฟลิโอ (สำหรับน้อง)
                            </button>
                            <button 
                                onClick={() => setActiveTab('senior')}
                                className={`px-4 py-2 rounded-md font-medium text-sm transition-all ${activeTab === 'senior' ? 'bg-amber-400 text-slate-900 shadow' : 'bg-maroon hover:bg-red-900 border border-red-700'}`}
                            >
                                📝 รุ่นพี่แชร์ผลงาน (ส่งพอร์ตจริง)
                            </button>
                        </div>
                    </header>

                    <main className="container mx-auto px-4 py-8 flex-grow">
                        {activeTab === 'junior' && (
                            <div>
                                <h2 className="text-xl font-bold text-slate-800 mb-4">แฟ้มสะสมผลงานทั้งหมดที่ผ่านการคัดเลือก</h2>
                                {/* แสดงการ์ดรายการพอร์ตฟอลิโอปกติ */}
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {portfolios.map(port => (
                                        <div key={port.id} className="bg-white rounded-lg p-6 shadow-sm border border-slate-200 flex flex-col justify-between hover:shadow-md transition-shadow">
                                            <div>
                                                <div className="flex items-center gap-3 mb-3">
                                                    <UniversityEmblem name={port.university} />
                                                    <div>
                                                        <h4 className="font-bold text-sm text-slate-900">{port.seniorName}</h4>
                                                        <p className="text-xs text-slate-500">{port.university}</p>
                                                    </div>
                                                </div>
                                                <h3 className="font-bold text-base text-slate-800 mb-2">{port.title}</h3>
                                                <p className="text-xs text-slate-600 mb-1"><strong>คณะ:</strong> {port.faculty} | <strong>สาขา:</strong> {port.major}</p>
                                                <p className="text-xs text-slate-600 mb-3"><strong>สายการเรียน ม.ปลาย:</strong> {port.track} (GPAX: {port.gpa})</p>
                                                <ul className="text-xs text-slate-500 list-disc list-inside space-y-1 mb-4 bg-slate-50 p-2 rounded">
                                                    {Array.isArray(port.highlights) ? port.highlights.map((h, i) => <li key={i}>{h}</li>) : <li>{port.highlights}</li>}
                                                </ul>
                                            </div>
                                            <button 
                                                onClick={() => setSelectedPort(port)}
                                                className="w-full py-2 bg-slate-800 hover:bg-slate-900 text-white font-medium text-xs rounded transition-colors"
                                            >
                                                เปิดดูรายละเอียดพอร์ตเล่มนี้
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'senior' && (
                            <div className="max-w-2xl mx-auto bg-slate-900 text-slate-100 rounded-xl p-8 shadow-xl border border-slate-800">
                                <div className="mb-6 border-b border-slate-800 pb-4">
                                    <h2 className="text-2xl font-bold text-amber-400">ฟอร์มส่งข้อมูลและแชร์พอร์ตโฟลิโอจริง</h2>
                                    <p className="text-xs text-slate-400 mt-1">ขอขอบคุณพี่ๆ ศิษย์เก่า บ.ส. ทุกคนที่ร่วมแบ่งปันแรงบันดาลใจและแนวทางให้กับน้องๆ รุ่นต่อไปครับ</p>
                                </div>

                                <form onSubmit={handleSubmitPortfolio} className="space-y-4">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-300 mb-1">ชื่อ-นามสกุล (และรุ่น บ.ส.) *</label>
                                            <input type="text" value={formName} onChange={(e) => setFormName(e.target.value)} placeholder="เช่น พี่เต้ (บ.ส.39)" required className="w-full px-3 py-2 bg-slate-800 rounded border border-slate-700 text-sm focus:outline-none focus:border-amber-400" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-300 mb-1">ชื่อเล่น *</label>
                                            <input type="text" value={formNickname} onChange={(e) => setFormNickname(e.target.value)} placeholder="เช่น เต้" required className="w-full px-3 py-2 bg-slate-800 rounded border border-slate-700 text-sm focus:outline-none focus:border-amber-400" />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-300 mb-1">สายการเรียนตอน ม.ปลาย *</label>
                                            <select value={formTrack} onChange={(e) => setFormTrack(e.target.value)} className="w-full px-3 py-2 bg-slate-800 rounded border border-slate-700 text-sm focus:outline-none focus:border-amber-400 text-white">
                                                <option value="วิทย์-คณิต">วิทย์-คณิต</option>
                                                <option value="วิทย์-คณิต(Gifted)">วิทย์-คณิต(Gifted)</option>
                                                <option value="คณิต-อังกฤษ">คณิต-อังกฤษ</option>
                                                <option value="ศิลป์-ภาษา">ศิลป์-ภาษา</option>
                                                <option value="เทคโนโลยีซอฟแวร์และหุ่นยนต์">เทคโนโลยีซอฟแวร์และหุ่นยนต์</option>
                                                <option value="มัลติมีเดียและภาพยนต์">มัลติมีเดียและภาพยนต์</option>
                                                <option value="สื่อสารมวลชนและสังคมศาสตร์">สื่อสารมวลชนและสังคมศาสตร์</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-300 mb-1">เกรดเฉลี่ยสะสม (GPAX) *</label>
                                            <input type="number" step="0.01" min="0.00" max="4.00" value={formGpa} onChange={(e) => setFormGpa(e.target.value)} placeholder="เช่น 3.85" required className="w-full px-3 py-2 bg-slate-800 rounded border border-slate-700 text-sm focus:outline-none focus:border-amber-400" />
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-xs font-semibold text-slate-300 mb-1">มหาวิทยาลัยที่สอบติด *</label>
                                        <select value={formUni} onChange={(e) => setFormUni(e.target.value)} className="w-full px-3 py-2 bg-slate-800 rounded border border-slate-700 text-sm focus:outline-none focus:border-amber-400 text-white">
                                            {Object.keys(UNI_COLORS).map(u => <option key={u} value={u}>{u}</option>)}
                                        </select>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-300 mb-1">คณะที่เข้าศึกษา *</label>
                                            <input type="text" value={formFaculty} onChange={(e) => setFormFaculty(e.target.value)} placeholder="เช่น วิศวกรรมศาสตร์" required className="w-full px-3 py-2 bg-slate-800 rounded border border-slate-700 text-sm focus:outline-none focus:border-amber-400" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-300 mb-1">สาขาวิชา/ภาควิชา *</label>
                                            <input type="text" value={formMajor} onChange={(e) => setFormMajor(e.target.value)} placeholder="เช่น วิศวกรรมคอมพิวเตอร์" required className="w-full px-3 py-2 bg-slate-800 rounded border border-slate-700 text-sm focus:outline-none focus:border-amber-400" />
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-xs font-semibold text-slate-300 mb-1">รอบคัดเลือกที่สอบติด *</label>
                                        <select value={formRound} onChange={(e) => setFormRound(e.target.value)} className="w-full px-3 py-2 bg-slate-800 rounded border border-slate-700 text-sm focus:outline-none focus:border-amber-400 text-white">
                                            <option value="รอบ 1 Portfolio">รอบ 1 Portfolio</option>
                                            <option value="รอบ 2 Quota (โควตา)">รอบ 2 Quota (โควตา)</option>
                                            <option value="รอบ 3 Admission">รอบ 3 Admission</option>
                                            <option value="รอบ 4 Direct Admission">รอบ 4 Direct Admission</option>
                                        </select>
                                    </div>

                                    <div>
                                        <label className="block text-xs font-semibold text-slate-300 mb-1">หัวข้อ/ชื่องานเขียนหน้าปกพอร์ต *</label>
                                        <input type="text" value={formTitle} onChange={(e) => setFormTitle(e.target.value)} placeholder="เช่น Portfolio ยื่นคณะวิศวกรรมศาสตร์ จุฬาฯ" required className="w-full px-3 py-2 bg-slate-800 rounded border border-slate-700 text-sm focus:outline-none focus:border-amber-400" />
                                    </div>

                                    <div className="space-y-2">
                                        <label className="block text-xs font-semibold text-slate-300">ผลงานเด่น/กิจกรรมไฮไลท์ 3 ลำดับ *</label>
                                        <input type="text" value={formHighlight1} onChange={(e) => setFormHighlight1(e.target.value)} placeholder="ผลงานเด่นที่ 1" required className="w-full px-3 py-2 bg-slate-800 rounded border border-slate-700 text-sm focus:outline-none focus:border-amber-400" />
                                        <input type="text" value={formHighlight2} onChange={(e) => setFormHighlight2(e.target.value)} placeholder="ผลงานเด่นที่ 2" required className="w-full px-3 py-2 bg-slate-800 rounded border border-slate-700 text-sm focus:outline-none focus:border-amber-400" />
                                        <input type="text" value={formHighlight3} onChange={(e) => setFormHighlight3(e.target.value)} placeholder="ผลงานเด่นที่ 3" required className="w-full px-3 py-2 bg-slate-800 rounded border border-slate-700 text-sm focus:outline-none focus:border-amber-400" />
                                    </div>

                                    <div>
                                        <label className="block text-xs font-semibold text-slate-300 mb-1">คำแนะนำหรือทริคสั้นๆ ถึงน้องๆ *</label>
                                        <textarea value={formTips} onChange={(e) => setFormTips(e.target.value)} rows="3" placeholder="เขียนแนะนำเทคนิคการจัดหน้าพอร์ต การสัมภาษณ์ หรือการเก็บผลงาน..." required className="w-full px-3 py-2 bg-slate-800 rounded border border-slate-700 text-sm focus:outline-none focus:border-amber-400 text-white"></textarea>
                                    </div>

                                    {/* 🌟 ช่องแชร์ลิงก์ Google Drive พอร์ตจริงที่เพิ่มเข้ามาใหม่ */}
                                    <div>
                                        <label className="block text-xs font-semibold text-amber-400 mb-1">ลิงก์แฟ้มสะสมผลงานจริง (Google Drive / Canva) *</label>
                                        <input 
                                            type="url" 
                                            value={formPortLink} 
                                            onChange={(e) => setFormPortLink(e.target.value)} 
                                            placeholder="https://drive.google.com/file/d/..." 
                                            required 
                                            className="w-full px-3 py-2 bg-slate-800 rounded border border-amber-500/50 text-sm focus:outline-none focus:border-amber-400 text-white placeholder-slate-500" 
                                        />
                                        <p className="mt-1 text-[11px] text-slate-400">
                                            💡 อย่าลืมตั้งค่าสิทธิ์แชร์ไฟล์ในกูเกิลไดรฟ์ให้เป็น <span className="text-amber-300 font-semibold">"ทุกคนที่มีลิงก์สามารถดูได้"</span> เพื่อให้น้องสามารถกดเปิดดูได้ด้วยนะครับ
                                        </p>
                                    </div>

                                    <div className="bg-slate-800/60 p-4 rounded-lg border border-slate-700/50 mt-4">
                                        <div className="flex items-start gap-3">
                                            <input type="checkbox" id="pdpa" checked={formPdpa} onChange={(e) => setFormPdpa(e.target.checked)} className="mt-1 accent-amber-400" />
                                            <label htmlFor="pdpa" className="text-xs text-slate-300 leading-relaxed select-none">
                                                <strong>PDPA Consent Warning & Privacy Policy:</strong> ข้าพเจ้ายินยอมให้ระบบ B.S. Portfolio Hub จัดเก็บและเผยแพร่ข้อมูลประวัติการศึกษา เกรดเฉลี่ย และผลงาน เพื่อเป็นประโยชน์ต่อการศึกษาแก่รุ่นน้องโรงเรียนเบญจมราชานุสรณ์ โดยข้อมูลนี้จะไม่ถูกนำไปใช้ในเชิงพาณิชย์
                                            </label>
                                        </div>
                                    </div>

                                    <button 
                                        type="submit" 
                                        disabled={isSubmitting}
                                        className={`w-full py-3 ${isSubmitting ? 'bg-slate-600 cursor-not-allowed' : 'bg-amber-400 hover:bg-amber-500 text-slate-900'} font-bold rounded text-sm transition-all shadow-md`}
                                    >
                                        {isSubmitting ? "🚀 กำลังบันทึกข้อมูล..." : "📝 ส่งข้อมูลร่วมแชร์ผลงานสิบล้อ"}
                                    </button>
                                </form>
                            </div>
                        )}
                    </main>

                    {/* ป๊อปอัป Modal แสดงรายละเอียดแบบเจาะลึกเมื่อผู้ใช้คลิกการ์ด */}
                    {selectedPort && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-xl max-w-lg w-full max-h-[90vh] overflow-y-auto p-6 shadow-2xl relative text-left">
                                <button onClick={() => setSelectedPort(null)} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600">
                                    <i data-lucide="x" className="w-5 h-5"></i>
                                </button>
                                
                                <div className="flex items-center gap-3 mb-4">
                                    <UniversityEmblem name={selectedPort.university} size="w-12 h-12" />
                                    <div>
                                        <h3 className="text-lg font-bold text-slate-900">{selectedPort.seniorName}</h3>
                                        <p className="text-sm text-slate-500">{selectedPort.university}</p>
                                    </div>
                                </div>
                                
                                <div className="space-y-3 border-t border-b border-slate-100 py-4 my-4 text-sm text-slate-700">
                                    <p><strong>ชื่อโครงการพอร์ต:</strong> {selectedPort.title}</p>
                                    <p><strong>แผนการศึกษา:</strong> {selectedPort.track} (เกรดรวม: {selectedPort.gpa})</p>
                                    <p><strong>คณะสาขาที่เรียน:</strong> คณะ{selectedPort.faculty} สาขา{selectedPort.major}</p>
                                    <p><strong>รอบที่สอบผ่าน:</strong> <span className="px-2 py-0.5 bg-green-100 text-green-800 text-xs font-semibold rounded">{selectedPort.round}</span></p>
                                    
                                    <div className="mt-2">
                                        <strong className="block text-slate-900 mb-1">ผลงานไฮไลท์สำคัญ:</strong>
                                        <ul className="list-disc list-inside text-xs text-slate-600 space-y-1">
                                            {String(selectedPort.highlights).split('|').map((h, i) => <li key={i}>{h.trim()}</li>)}
                                        </ul>
                                    </div>

                                    <div className="mt-2 bg-amber-50 border-l-4 border-amber-400 p-3 rounded">
                                        <strong className="text-amber-800 text-xs block mb-1">💡 ทริคและคำแนะนำจากรุ่นพี่:</strong>
                                        <p className="text-xs text-amber-900 italic leading-relaxed">"{selectedPort.tips || selectedPort.intro}"</p>
                                    </div>
                                </div>

                                <div className="mt-4 flex gap-3">
                                    <a 
                                        href={selectedPort.port_link && selectedPort.port_link !== "#" ? selectedPort.port_link : undefined}
                                        target="_blank" 
                                        rel="noopener noreferrer"
                                        onClick={(e) => {
                                            if(!selectedPort.port_link || selectedPort.port_link === "#") {
                                                e.preventDefault();
                                                alert("พอร์ตโฟลิโอนี้เป็นข้อมูลจำลอง (Mock Data) จึงยังไม่มีลิงก์ไฟล์พอร์ตจริงให้เปิดดูครับ");
                                            }
                                        }}
                                        className="flex-1 text-center py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold rounded shadow transition-colors"
                                    >
                                        📂 เปิดดูไฟล์พอร์ตโฟลิโอเล่มจริง
                                    </a>
                                    <button 
                                        onClick={() => setSelectedPort(null)} 
                                        className="px-4 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-medium rounded transition-colors"
                                    >
                                        ปิดหน้าต่าง
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="bg-slate-900 text-slate-400 text-center py-4 text-xs border-t border-slate-800">
                        <p>© 2026 B.S. Portfolio Hub - โรงเรียนเบญจมราชานุสรณ์. All Rights Reserved.</p>
                    </footer>
                </div>
            );
        }

        const root = royalty = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <script>
        // เผื่อเรียกใช้งานไอคอน Lucide Icons ตอนเปิดหน้าเว็บเสร็จสิ้น
        setTimeout(() => { if(window.lucide) lucide.createIcons(); }, 1000);
    </script>
</body>
</html>
