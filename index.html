<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>B.S. Portfolio Hub</title>

    <meta name="description"
        content="ระบบรวบรวม Portfolio รุ่นพี่ โรงเรียนเบญจมราชานุสรณ์">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body class="bg-slate-100">

    <!-- ========================= -->
    <!-- Header -->
    <!-- ========================= -->

    <header class="shadow bg-white sticky top-0 z-50">

        <div class="max-w-7xl mx-auto">

            <div class="flex items-center justify-between h-16 px-4">

                <div class="flex items-center gap-3">

                    <div class="logo-box">

                        BS

                    </div>

                    <div>

                        <h1 class="text-lg font-bold">

                            B.S. Portfolio Hub

                        </h1>

                        <p class="text-xs text-gray-500">

                            Benjamarachanusorn School

                        </p>

                    </div>

                </div>

                <div id="userMenu">

                    <a href="login.html"
                        class="bg-red-800 hover:bg-red-900 text-white px-5 py-2 rounded-xl">

                        เข้าสู่ระบบ

                    </a>

                </div>

            </div>

        </div>

    </header>

    <!-- ========================= -->
    <!-- Hero -->
    <!-- ========================= -->

    <section class="hero">

        <div class="max-w-7xl mx-auto px-4 py-14">

            <h2 class="text-4xl font-bold text-white">

                คลังพอร์ตโฟลิโอ

            </h2>

            <p class="text-white mt-3">

                ส่งต่อแรงบันดาลใจจากรุ่นพี่สู่รุ่นน้อง

            </p>

        </div>

    </section>

    <!-- ========================= -->
    <!-- Search -->
    <!-- ========================= -->

    <section class="max-w-7xl mx-auto px-4 mt-8">

        <div class="card">

            <h3 class="section-title">

                ค้นหาพอร์ต

            </h3>

            <div class="grid md:grid-cols-3 gap-4 mt-4">

                <input
                    id="searchInput"
                    type="text"
                    class="input"
                    placeholder="ค้นหาคณะ หรือ สาขา">

                <select
                    id="universityFilter"
                    class="input">

                    <option value="">

                        ทุกมหาวิทยาลัย

                    </option>

                </select>

                <select
                    id="roundFilter"
                    class="input">

                    <option value="">

                        ทุกรอบ

                    </option>

                    <option>

                        รอบ 1 Portfolio

                    </option>

                    <option>

                        รอบ 2 Quota

                    </option>

                    <option>

                        รอบ 3 Admission

                    </option>

                </select>

            </div>

        </div>

    </section>

    <!-- ========================= -->
    <!-- Portfolio List -->
    <!-- ========================= -->

    <section class="max-w-7xl mx-auto px-4 mt-8">

        <div
            id="portfolioContainer"
            class="grid lg:grid-cols-2 gap-6">

        </div>

    </section>

    <!-- ========================= -->
    <!-- Submit Form -->
    <!-- ========================= -->

    <section class="max-w-7xl mx-auto px-4 my-10">

        <div class="card">

            <h2 class="section-title">

                แชร์ Portfolio

            </h2>

            <form id="portfolioForm">

                <div class="grid md:grid-cols-2 gap-5 mt-5">

                    <input
                        id="fullname"
                        class="input"
                        placeholder="ชื่อ-นามสกุล">

                    <input
                        id="nickname"
                        class="input"
                        placeholder="ชื่อเล่น">

                    <input
                        id="gpax"
                        class="input"
                        placeholder="GPAX">

                    <input
                        id="faculty"
                        class="input"
                        placeholder="คณะ">

                    <input
                        id="major"
                        class="input"
                        placeholder="สาขา">

                    <input
                        id="university"
                        class="input"
                        placeholder="มหาวิทยาลัย">

                    <input
                        id="title"
                        class="input md:col-span-2"
                        placeholder="ชื่อ Portfolio">

                    <textarea
                        id="highlights"
                        class="textarea md:col-span-2"
                        rows="5"
                        placeholder="ผลงานเด่น"></textarea>

                    <textarea
                        id="tips"
                        class="textarea md:col-span-2"
                        rows="5"
                        placeholder="คำแนะนำ"></textarea>

                    <input
                        id="portlink"
                        class="input md:col-span-2"
                        placeholder="Google Drive">

                </div>

                <button
                    class="btn-primary mt-6"
                    type="submit">

                    บันทึก Portfolio

                </button>

            </form>

        </div>

    </section>

    <!-- ========================= -->
    <!-- Modal -->
    <!-- ========================= -->

    <div
        id="portfolioModal"
        class="hidden modal">

        <div class="modal-box">

            <button
                id="closeModal"
                class="close-btn">

                ✕

            </button>

            <div id="modalContent">

            </div>

        </div>

    </div>

    <!-- ========================= -->
    <!-- Footer -->
    <!-- ========================= -->

    <footer class="bg-slate-900 text-white mt-10">

        <div class="max-w-7xl mx-auto px-4 py-8 text-center">

            © 2026

            B.S. Portfolio Hub

        </div>

    </footer>

    <!-- JavaScript -->

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/search.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/form.js"></script>
    <script src="js/portfolio.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
