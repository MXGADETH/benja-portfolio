                                            </div>
                                            <div>
                                                <label className="block text-[11px] font-bold text-slate-700 mb-1">สายการเรียนเดิม *</label>
                                                <input type="text" required value={formTrack} onChange={(e) => setFormTrack(e.target.value)} className="w-full px-2.5 py-1.5 border border-slate-300 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-red-800/20" placeholder="วิทย์-คณิต" />
                                            </div>
                                            <div>
                                                <label className="block text-[11px] font-bold text-slate-700 mb-1">เกรดเฉลี่ย (GPAX) *</label>
                                                <input type="number" step="0.01" min="0" max="4" required value={formGpa} onChange={(e) => setFormGpa(e.target.value)} className="w-full px-2.5 py-1.5 border border-slate-300 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-red-800/20" placeholder="3.50" />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="space-y-3 pt-2">
                                        <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-wider border-b border-slate-100 pb-1">2. มหาวิทยาลัยที่สอบติด</h4>
                                        <div className="space-y-2">
                                            <div>
                                                <label className="block text-[11px] font-bold text-slate-700 mb-1">มหาวิทยาลัยปลายทาง *</label>
                                                <input type="text" required value={formUni} onChange={(e) => setFormUni(e.target.value)} className="w-full px-2.5 py-1.5 border border-slate-300 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-red-800/20" placeholder="เช่น จุฬาลงกรณ์มหาวิทยาลัย" />
                                            </div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div>
                                                    <label className="block text-[11px] font-bold text-slate-700 mb-1">คณะ *</label>
                                                    <input type="text" required value={formFaculty} onChange={(e) => setFormFaculty(e.target.value)} className="w-full px-2.5 py-1.5 border border-slate-300 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-red-800/20" placeholder="วิศวกรรมศาสตร์" />
                                                </div>
                                                <div>
                                                    <label className="block text-[11px] font-bold text-slate-700 mb-1">ภาควิชา/สาขา *</label>
                                                    <input type="text" required value={formMajor} onChange={(e) => setFormMajor(e.target.value)} className="w-full px-2.5 py-1.5 border border-slate-300 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-red-800/20" placeholder="วิศวกรรมไฟฟ้า" />
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-[11px] font-bold text-slate-700 mb-1">รอบระบบ TCAS ที่ผ่าน *</label>
                                                <select value={formRound} onChange={(e) => setFormRound(e.target.value)} className="w-full px-2.5 py-1.5 border border-slate-300 rounded-xl text-xs bg-white focus:outline-none focus:ring-2 focus:ring-red-800/20">
                                                    <option value="รอบ 1 Portfolio">รอบ 1 Portfolio</option>
                                                    <option value="รอบ 2 Quota">รอบ 2 Quota</option>
                                                    <option value="รอบ 3 Admission">รอบ 3 Admission</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="space-y-3 pt-2">
                                        <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-wider border-b border-slate-100 pb-1">3. รายละเอียดและแนวทางการเตรียมเล่ม</h4>
                                        <div className="space-y-2">
                                            <div>
                                                <label className="block text-[11px] font-bold text-slate-700 mb-1">หัวข้อคอนเซปต์ของพอร์ต *</label>
                                                <input type="text" required value={formTitle} onChange={(e) => setFormTitle(e.target.value)} className="w-full px-2.5 py-1.5 border border-slate-300 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-red-800/20" placeholder="เช่น พอร์ตเน้นกิจกรรมค่ายและจิตอาสา" />
                                            </div>
                                            <div>
                                                <label className="block text-[11px] font-bold text-slate-700 mb-1">ผลงานเด่น/เกียรติบัตร (เคาะขึ้นบรรทัดใหม่สั้น ๆ) *</label>
                                                <textarea required rows="2" value={formHighlights} onChange={(e) => setFormHighlights(e.target.value)} className="w-full px-2.5 py-1.5 border border-slate-300 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-red-800/20" placeholder="เกียรติบัตรเรียนดีระดับจังหวัด&#10;ประธานค่ายสากลโรงเรียน บ.ส."></textarea>
                                            </div>
                                            <div>
                                                <label className="block text-[11px] font-bold text-slate-700 mb-1">ข้อแนะนำบอกต่อน้อง ๆ ม.ปลาย *</label>
                                                <textarea required rows="2" value={formTips} onChange={(e) => setFormTips(e.target.value)} className="w-full px-2.5 py-1.5 border border-slate-300 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-red-800/20" placeholder="เก็บเกี่ยวเกียรติบัตรและค่ายกิจกรรมที่ตรงสายคณะตั้งแต่อยู่ ม.4 นะครับน้อง ๆ"></textarea>
                                            </div>
                                            <div>
                                                <label className="block text-[11px] font-bold text-slate-700 mb-1">ลิงก์แนบไฟล์เล่มพอร์ตโฟลิโอ (Google Drive/Canva) *</label>
                                                <input type="url" required value={formPortLink} onChange={(e) => setFormPortLink(e.target.value)} className="w-full px-2.5 py-1.5 border border-slate-300 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-red-800/20" placeholder="https://drive.google.com/..." />
                                            </div>
                                        </div>
                                    </div>

                                    <button 
                                        type="submit" 
                                        disabled={isSubmitting}
                                        className="w-full bs-bg-maroon hover:bg-red-900 text-white font-bold py-2.5 px-4 rounded-xl text-xs shadow-md shadow-red-950/20 disabled:opacity-50 transition mt-2 cursor-pointer"
                                    >
                                        {isSubmitting ? 'กำลังยิงข้อมูลเชื่อม Sheets...' : 'บันทึกแบ่งปันข้อมูลลงบอร์ดทันที'}
                                    </button>
                                </form>
                            </div>
                        </section>
                    </main>

                    {/* Exhibition Detail Modal View */}
                    {selectedPort && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-2xl max-w-2xl w-full max-h-[85vh] overflow-hidden flex flex-col shadow-2xl border border-slate-100 animate-in fade-in zoom-in-95 duration-200">
                                
                                <div className="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                                    <div className="flex items-center gap-2">
                                        <span className="w-3 h-3 rounded-full bg-red-500"></span>
                                        <span className="text-xs font-bold text-slate-500 uppercase tracking-wider">แผ่นนิทรรศการจัดแสดงผลงานศิษย์เก่า บ.ส.</span>
                                    </div>
                                    <button 
                                        onClick={() => setSelectedPort(null)}
                                        className="w-7 h-7 rounded-lg bg-slate-200 text-slate-600 flex items-center justify-center font-bold text-sm hover:bg-slate-300 transition cursor-pointer"
                                    >
                                        ✕
                                    </button>
                                </div>

                                <div className="p-6 overflow-y-auto space-y-6 flex-1">
                                    <div>
                                        <h3 className="text-lg font-bold text-slate-900 leading-snug">{selectedPort.title}</h3>
                                        <p className="text-xs text-slate-500 mt-1 font-medium">
                                            บันทึกผลการคัดเลือกโดย: {selectedPort.seniorName} | แผนการเรียนมัธยม: {selectedPort.track} (เกรดสะสม {selectedPort.gpa})
                                        </p>
                                    </div>

                                    <div className="bg-slate-50 border border-slate-200 rounded-xl p-4 grid grid-cols-3 gap-3 text-center">
                                        <div className="space-y-0.5">
                                            <span className="text-[10px] font-bold text-slate-400 block uppercase">สถาบันอุดมศึกษา</span>
                                            <span className="text-xs font-bold text-slate-800 block">{selectedPort.university}</span>
                                        </div>
                                        <div className="space-y-0.5 border-x border-slate-200">
                                            <span className="text-[10px] font-bold text-slate-400 block uppercase">คณะที่สอบติด</span>
                                            <span className="text-xs font-bold text-slate-800 block">{selectedPort.faculty}</span>
                                        </div>
                                        <div className="space-y-0.5">
                                            <span className="text-[10px] font-bold text-slate-400 block uppercase">สาขาวิชาเอก</span>
                                            <span className="text-xs font-bold text-slate-800 block">{selectedPort.major}</span>
                                        </div>
                                    </div>

                                    <div className="space-y-2">
                                        <h5 className="text-xs font-bold text-slate-900 flex items-center gap-1.5">
                                            ✨ รายการผลงานชิ้นโบว์แดงในรูปเล่ม
                                        </h5>
                                        <ul className="space-y-1.5 pl-1">
                                            {Array.isArray(selectedPort.highlights) ? (
                                                selectedPort.highlights.map((hl, i) => (
                                                    <li key={i} className="text-xs text-slate-600 flex items-start gap-2 leading-relaxed">
                                                        <span className="text-red-800 mt-0.5 shrink-0">✓</span>
                                                        <span>{hl}</span>
                                                    </li>
                                                ))
                                            ) : (
                                                <li className="text-xs text-slate-600 leading-relaxed">{selectedPort.highlights}</li>
                                            )}
                                        </ul>
                                    </div>

                                    <div className="p-4 bg-amber-50 rounded-xl border border-amber-200/60 space-y-1.5">
                                        <h5 className="text-xs font-bold text-amber-900 flex items-center gap-1.5">
                                            💡 คำแนะนำและเทคนิคการสัมภาษณ์/เตรียมตัว
                                        </h5>
                                        <p className="text-xs text-amber-800 leading-relaxed font-normal">{selectedPort.tips}</p>
                                    </div>

                                    {selectedPort.pagePreviews && (
                                        <div className="space-y-2.5">
                                            <h5 className="text-xs font-bold text-slate-900">📂 ตัวอย่างเค้าโครงหน้ากระดาษ (Layout Preview)</h5>
                                            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                                                {selectedPort.pagePreviews.map((page, idx) => (
                                                    <div key={idx} className="border border-slate-200 rounded-xl p-2.5 bg-slate-50/50 space-y-1.5 flex flex-col justify-between">
                                                        <div className={`h-20 w-full rounded-lg ${page.color} flex items-center justify-center opacity-70`}>
                                                            <span className="text-[10px] font-bold text-white uppercase tracking-wider">Page {idx+1}</span>
                                                        </div>
                                                        <div>
                                                            <h6 className="text-[11px] font-bold text-slate-800 truncate">{page.title}</h6>
                                                            <p className="text-[9px] text-slate-400 line-clamp-2 leading-tight">{page.desc}</p>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="p-4 bg-slate-50 border-t border-slate-200 flex justify-end gap-2">
                                    <a 
                                        href={selectedPort.port_link} 
                                        target="_blank" 
                                        rel="noreferrer"
                                        className="bg-red-800 hover:bg-red-900 text-white text-xs font-bold px-4 py-2 rounded-xl shadow transition flex items-center gap-1.5 cursor-pointer"
                                    >
                                        🔗 คลิกเปิดลิงก์ดูรูปเล่มพอร์ตตัวเต็ม
                                    </a>
                                </div>

                            </div>
                        </div>
                    )}

                    {/* Success Submission Notification Modal */}
                    {showSuccessModal && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-2xl p-6 max-w-sm w-full text-center shadow-xl">
                                <div className="w-12 h-12 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4 text-xl">✓</div>
                                <h3 className="font-bold text-lg text-slate-900 mb-1">ส่งข้อมูลเรียบร้อยแล้ว!</h3>
                                <p className="text-xs text-slate-500 mb-4">ข้อมูลพอร์ตโฟลิโอของคุณถูกผูกกับบัญชีและบันทึกลงฐานข้อมูลเรียบร้อยแล้ว ขอบคุณที่ร่วมส่งต่อสิ่งดีๆ ครับ</p>
                                <button 
                                    onClick={() => setShowSuccessModal(false)} 
                                    className="w-full bg-slate-900 hover:bg-slate-800 text-white text-xs font-bold py-2.5 px-4 rounded-xl transition cursor-pointer"
                                >
                                    ตกลง รับทราบ
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Footer Container */}
                    <footer className="bg-slate-900 text-white py-8 px-4 mt-12 border-t border-slate-800">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="text-center md:text-left">
                                <h4 className="text-sm font-bold text-amber-400">B.S. Portfolio Hub Prototype</h4>
                                <p className="text-xs text-slate-400 mt-1">โครงงานนำเสนอสถิติและการเตรียมตัวเรียนต่อของสภานักเรียน โรงเรียนเบญจมราชานุสรณ์ นนทบุรี</p>
                            </div>
                            <div className="text-xs text-slate-500">
                                © 2026 Benjamarachanusorn School Portfolio Hub. All Rights Reserved.
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }
        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
