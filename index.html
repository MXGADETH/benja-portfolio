                                            </div>
                                        </div>

                                        {portfolios.filter(p => p.status === 'pending').length === 0 ? (
                                            <div className="text-center py-12 max-w-md mx-auto">
                                                <div className="w-12 h-12 bg-slate-50 text-slate-400 rounded-full flex items-center justify-center mx-auto mb-3">
                                                    <i data-lucide="inbox" className="w-6 h-6"></i>
                                                </div>
                                                <h4 className="font-bold text-slate-700 text-sm">ไม่มีคำขอยื่นเผยแพร่พอร์ตโฟลิโอตกค้าง</h4>
                                                <p className="text-xs text-slate-500 mt-1">ระบบอยู่ในสถานะอัปเดตปัจจุบันและพร้อมตรวจสอบผลงานถัดไปทันที</p>
                                            </div>
                                        ) : (
                                            <div className="space-y-6">
                                                {portfolios.filter(p => p.status === 'pending').map((port) => (
                                                    <div 
                                                        key={port.id}
                                                        className="border border-amber-200 bg-amber-50/20 rounded-2xl p-5 md:p-6 flex flex-col md:flex-row justify-between gap-6"
                                                    >
                                                        <div className="flex-1">
                                                            <div className="flex items-center gap-2.5 flex-wrap">
                                                                <span className="bg-[#800000] text-white text-[10px] font-bold px-2 py-0.5 rounded">
                                                                    {port.round}
                                                                </span>
                                                                <span className="bg-amber-400/20 text-amber-900 border border-amber-300 text-[10px] font-bold px-2 py-0.5 rounded flex items-center gap-1">
                                                                    <i data-lucide="shield-alert" className="w-3 h-3"></i> {port.hasPdpaChecked ? 'รุ่นพี่ยืนยันผ่านด่านตรวจสอบ PDPA แล้ว' : 'ยังไม่ได้ตรวจสอบ'}
                                                                </span>
                                                                <span className="text-xs text-slate-400">ส่งโดย: {port.seniorName} • แผนการเรียน: {port.track}</span>
                                                            </div>

                                                            <h4 className="text-base font-bold text-slate-800 mt-3">{port.title}</h4>
                                                            <p className="text-xs text-[#800000] font-semibold mt-1">เป้าหมายคัดเลือก: {port.university} | คณะ{port.faculty} (สาขา{port.major})</p>

                                                            {/* Highlights Details */}
                                                            <div className="mt-4 bg-white p-4 rounded-xl border border-slate-200">
                                                                <h5 className="text-xs font-bold text-slate-600 uppercase mb-2">สรุปผลงานสำคัญในไฟล์พอร์ต:</h5>
                                                                <ul className="space-y-1">
                                                                    {port.highlights.map((hl, idx) => (
                                                                        <li key={idx} className="text-xs text-slate-600 flex items-start gap-2">
                                                                            <span className="w-1.5 h-1.5 bg-amber-500 rounded-full mt-1.5 shrink-0"></span>
                                                                            <span>{hl}</span>
                                                                        </li>
                                                                    ))}
                                                                </ul>
                                                            </div>

                                                            {/* Advice Preview */}
                                                            {port.tips && (
                                                                <div className="mt-3 text-xs text-slate-500 bg-slate-50/80 p-3 rounded-lg border border-slate-200">
                                                                    <strong>คำแนะนำที่แนบมา:</strong> "{port.tips}"
                                                                </div>
                                                            )}
                                                        </div>

                                                        {/* Approval CTA Box */}
                                                        <div className="md:w-48 shrink-0 flex flex-col gap-2 justify-center border-t md:border-t-0 md:border-l border-slate-200 pt-4 md:pt-0 md:pl-6">
                                                            <button 
                                                                onClick={() => handleApprove(port.id)}
                                                                className="w-full py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-bold text-xs flex items-center justify-center gap-1 transition-all"
                                                            >
                                                                <i data-lucide="check" className="w-4 h-4"></i>
                                                                อนุมัติพอร์ตขึ้นเว็บ
                                                            </button>
                                                            <button 
                                                                onClick={() => handleReject(port.id)}
                                                                className="w-full py-2.5 bg-rose-50 hover:bg-rose-100 text-rose-800 border border-rose-200 rounded-xl font-bold text-xs flex items-center justify-center gap-1 transition-all"
                                                            >
                                                                <i data-lucide="x" className="w-4 h-4"></i>
                                                                ไม่อนุมัติ / ลบออก
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                    </main>

                    {/* MODAL: PORTFOLIO DETAILED PREVIEW */}
                    {selectedPort && (
                        <div className="fixed inset-0 bg-slate-900/75 backdrop-blur-sm flex items-center justify-center z-50 p-4 overflow-y-auto">
                            <div className="bg-white rounded-2xl max-w-4xl w-full shadow-2xl overflow-hidden border border-slate-200 flex flex-col md:flex-row max-h-[90vh]">
                                
                                {/* Left Side: Mock Page Preview Frame */}
                                <div className="md:w-1/2 bg-slate-900 p-6 flex flex-col justify-between text-white overflow-y-auto">
                                    <div>
                                        <div className="flex justify-between items-center mb-6">
                                            <span className="text-[10px] font-bold text-amber-300 uppercase tracking-wider bg-white/10 px-2 py-1 rounded border border-white/20">
                                                โครงสร้างหน้าเล่มพอร์ตจำลอง
                                            </span>
                                            <span className="text-xs text-slate-400">พรีวิวสารบัญในเล่ม</span>
                                        </div>

                                        <div className="space-y-4">
                                            {selectedPort.pagePreviews && selectedPort.pagePreviews.map((page, idx) => {
                                                const coverCol = UNI_COLORS[selectedPort.university]?.primary || '#800000';
                                                return (
                                                    <div key={idx} className="bg-slate-800 rounded-xl border border-slate-700 p-4 hover:border-amber-400 cursor-pointer transition-all">
                                                        <div className="flex gap-3 items-center">
                                                            <div 
                                                                style={{ backgroundColor: idx === 0 ? coverCol : '#f1f5f9' }}
                                                                className={`w-12 h-16 rounded-md flex items-center justify-center text-[10px] font-extrabold ${idx === 0 ? 'text-white' : 'text-slate-700'} text-center shadow p-1 shrink-0`}
                                                            >
                                                                หน้า {idx + 1}
                                                            </div>
                                                            <div>
                                                                <h5 className="text-sm font-semibold text-slate-100">{page.title}</h5>
                                                                <p className="text-xs text-slate-400 mt-0.5">{page.desc}</p>
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    <div className="mt-6 pt-4 border-t border-slate-800 text-[11px] text-slate-500 text-center flex items-center justify-center gap-2">
                                        <UniversityEmblem name={selectedPort.university} size="w-6 h-6" />
                                        <span>ดีไซน์ต้นแบบระบบคลังสถิติเบญจมราชานุสรณ์</span>
                                    </div>
                                </div>

                                {/* Right Side: Portfolio Info details */}
                                <div className="flex-1 p-6 md:p-8 overflow-y-auto flex flex-col justify-between">
                                    <div>
                                        <div className="flex justify-between items-start gap-4 mb-4">
                                            <div>
                                                <span 
                                                    style={{ backgroundColor: UNI_COLORS[selectedPort.university]?.primary || '#800000' }} 
                                                    className="text-xs font-semibold text-white px-2.5 py-1 rounded-full"
                                                >
                                                    {selectedPort.round}
                                                </span>
                                                <h3 className="text-xl font-bold text-slate-800 mt-3">{selectedPort.title}</h3>
                                            </div>
                                            <button 
                                                onClick={() => setSelectedPort(null)}
                                                className="w-8 h-8 bg-slate-100 hover:bg-slate-200 text-slate-500 rounded-full flex items-center justify-center transition-all shrink-0"
                                            >
                                                <i data-lucide="x" className="w-4 h-4"></i>
                                            </button>
                                        </div>

                                        <div className="grid grid-cols-2 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-200 mb-6">
                                            <div>
                                                <p className="text-[10px] text-slate-400 font-bold uppercase">มหาวิทยาลัยปลายทาง</p>
                                                <div className="text-sm font-bold text-slate-800 flex items-center gap-1.5 mt-0.5">
                                                    <UniversityEmblem name={selectedPort.university} size="w-5 h-5" />
                                                    <span className="ml-1 leading-none">{selectedPort.university}</span>
                                                </div>
                                            </div>
                                            <div>
                                                <p className="text-[10px] text-slate-400 font-bold uppercase">คณะ / ภาควิชา</p>
                                                <p className="text-sm font-bold text-slate-800">{selectedPort.faculty}</p>
                                            </div>
                                            <div>
                                                <p className="text-[10px] text-slate-400 font-bold uppercase">สายการเรียน</p>
                                                <p className="text-sm font-semibold text-slate-800">{selectedPort.track}</p>
                                            </div>
                                            <div>
                                                <p className="text-[10px] text-slate-400 font-bold uppercase">เกรดเฉลี่ย (GPAX)</p>
                                                <p className="text-sm font-bold text-slate-800">{selectedPort.gpa}</p>
                                            </div>
                                        </div>

                                        {/* Highlights list */}
                                        <div className="mb-6">
                                            <h4 className="text-xs font-bold text-slate-600 uppercase mb-2.5 tracking-wider">ผลงาน/กิจกรรมที่โดนใจกรรมการ (Highlights)</h4>
                                            <ul className="space-y-2">
                                                {selectedPort.highlights.map((hl, idx) => (
                                                    <li key={idx} className="text-xs text-slate-700 bg-emerald-50/50 border border-emerald-100/50 p-2.5 rounded-lg flex items-start gap-2">
                                                        <span className="w-5 h-5 rounded-full bg-emerald-100 text-emerald-800 flex items-center justify-center text-[10px] font-bold shrink-0 mt-0.5">✓</span>
                                                        <span>{hl}</span>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>

                                        {/* Senior Tips */}
                                        <div className="bg-amber-50 border border-amber-200 p-4 rounded-xl text-xs text-amber-900 leading-relaxed">
                                            <h5 className="font-bold mb-1 flex items-center gap-1 text-amber-950">
                                                <i data-lucide="quote" className="w-3.5 h-3.5"></i>
                                                เทคนิคการเตรียมผลงานจาก พี่{selectedPort.nickname || selectedPort.seniorName} :
                                            </h5>
                                            <p className="italic">"{selectedPort.tips}"</p>
                                        </div>
                                    </div>

                                    {/* Modal Action footer */}
                                    <div className="mt-8 pt-4 border-t border-slate-100 flex gap-3">
                                        <a 
                                            href={selectedPort.port_link && selectedPort.port_link !== "#" ? selectedPort.port_link : undefined}
                                            target="_blank" 
                                            rel="noopener noreferrer"
                                            onClick={(e) => {
                                                if(!selectedPort.port_link || selectedPort.port_link === "#") {
                                                    e.preventDefault();
                                                    triggerNotification(
                                                        'พอร์ตโฟลิโอนี้เป็นข้อมูลระบบจำลอง',
                                                        `พอร์ตของพี่ ${selectedPort.seniorName} เล่มนี้เป็นข้อมูลตั้งต้นเพื่อเป็นตัวอย่าง จึงยังไม่มีไฟล์ Google Drive จริงให้เปิดดูครับ แต่พอร์ตที่ส่งเข้ามาใหม่หลังจากนี้จะกดเปิดดูได้จริงทั้งหมดจ้า!`,
                                                        'info'
                                                    );
                                                }
                                            }}
                                            className="flex-1 py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-bold text-xs flex items-center justify-center gap-1.5 transition-all shadow-md text-center"
                                        >
                                            <i data-lucide="external-link" className="w-4 h-4"></i>
                                            เปิดดูไฟล์พอร์ตโฟลิโอเล่มจริง (Drive)
                                        </a>
                                        <button 
                                            onClick={() => setSelectedPort(null)}
                                            className="px-5 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl font-bold text-xs transition-all border border-slate-200"
                                        >
                                            ปิดหน้าต่าง
                                        </button>
                                    </div>
                                </div>

                            </div>
                        </div>
                    )}

                    {/* ELEGANT CUSTOM DIALOG / NOTIFICATION DIALOG OVERLAY */}
                    {notification && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[60] p-4">
                            <div className="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl border border-slate-100 text-center">
                                <div className={`w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-4 ${notification.type === 'success' ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}`}>
                                    <i data-lucide={notification.type === 'success' ? "check-circle" : "info"} className="w-6 h-6"></i>
                                </div>
                                <h3 className="text-lg font-bold text-slate-800 mb-2">{notification.title}</h3>
                                <p className="text-sm text-slate-600 mb-6 leading-relaxed">{notification.message}</p>
                                <button 
                                    onClick={() => setNotification(null)}
                                    className="px-6 py-2.5 bg-slate-900 hover:bg-slate-800 text-white rounded-xl text-xs font-semibold transition-all w-full"
                                >
                                    ตกลง รับทราบ
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Footer */}
                    <footer className="bg-slate-900 text-white py-8 px-4 mt-12 border-t border-slate-800">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="text-center md:text-left">
                                <h4 className="text-sm font-bold text-amber-400">B.S. Portfolio Hub Prototype</h4>
                                <p className="text-xs text-slate-400 mt-1">โครงงานนำเสนอสถิติและการเตรียมตัวเรียนต่อของสภานักเรียน โรงเรียนเบญจมราชานุสรณ์ นนทบุรี</p>
                            </div>
                            <div className="text-xs text-slate-500">
                                © 2026 Benjamarachanusorn School Portfolio Hub. All Rights Reserved.
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>


พี่ได้แก้ไขโค้ดทั้งหมดให้กลับมาทำงานได้อย่างสวยงามตามปกติแล้วครับ มีคำถามอื่นเกี่ยวกับหน้าตาหรือโค้ดส่วนไหนเพิ่มเติม สามารถบอกพี่ได้ตลอดเวลาเลยนะจ๊ะ!
